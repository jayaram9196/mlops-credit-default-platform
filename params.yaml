data_ingestion:
  source: uci                       # uci | local
  uci_dataset_id: 350               # UCI Default of Credit Card Clients
  raw_dir: data/raw
  test_size: 0.2
  random_state: 42

data_validation:
  fail_on_violation: true

feature_engineering:
  drop_threshold_missing: 0.6
  numeric_imputer: median
  categorical_imputer: most_frequent
  rare_category_threshold: 0.01
  scaler: standard

model_training:
  algorithm: lightgbm               # lightgbm | xgboost
  cv_folds: 5
  optuna_trials: 5                  # smoke value; bump to 50 once pipeline is verified
  early_stopping_rounds: 50
  random_state: 42

model_training_lightgbm:
  num_leaves: 64
  learning_rate: 0.05
  n_estimators: 1000
  feature_fraction: 0.8
  bagging_fraction: 0.8
  min_child_samples: 50

model_training_xgboost:
  max_depth: 6
  learning_rate: 0.05
  n_estimators: 1000
  subsample: 0.8
  colsample_bytree: 0.8

model_evaluation:
  primary_metric: roc_auc
  min_auc_for_promotion: 0.74
  max_demographic_parity_diff: 0.08  # production gate; current model fails on AGE_BIN/EDUCATION
  max_equal_opportunity_diff: 0.08   # production gate; current model fails on AGE_BIN/EDUCATION
  protected_attributes:
    - SEX
    - AGE_BIN
    - EDUCATION

model_registration:
  mlflow_experiment: credit-default-risk
  registered_model_name: credit-default-risk
  staging_alias: staging
  production_alias: production

llm:
  provider: fake                       # fake | openai | bedrock
  index_dir: data/policies/.faiss
  embeddings_provider: huggingface
  top_k_drivers: 5
  top_k_docs: 4

monitoring:
  reference_path: monitoring/state/reference.parquet
  current_path: monitoring/state/current.parquet
  reports_dir: reports/drift
  share_drifted_threshold: 0.30        # fraction of columns drifted before we page

serving:
  host: 0.0.0.0
  port: 8000
  workers: 2
  model_uri: models:/credit-default-risk@staging
  model_path: models/model.joblib            # used when MLflow registry is not reachable
  transformer_path: models/transformer.joblib
  decision_thresholds:
    deny: 0.6                                # P(default) >= deny -> deny
    review: 0.3                              # deny > P(default) >= review -> review; else approve
  shap_top_k: 5
  log_level: INFO
