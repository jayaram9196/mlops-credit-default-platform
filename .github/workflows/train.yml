name: train

on:
  pull_request:
    branches: [main]
    paths:
      - "params.yaml"
      - "src/data/**"
      - "src/features/**"
      - "src/models/**"
      - "dvc.yaml"
  workflow_dispatch:
    inputs:
      optuna_trials:
        description: "Optuna trials (override)"
        default: "10"
        required: false

concurrency:
  group: train-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  pipeline:
    name: dvc repro + metrics diff
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[serving,monitoring,dev]"

      - name: cap budget for PR runs
        run: |
          python -c "
          import yaml, pathlib, os
          p = pathlib.Path('params.yaml')
          d = yaml.safe_load(p.read_text())
          trials = int(os.environ.get('TRIALS', '${{ inputs.optuna_trials || 10 }}'))
          d['model_training']['optuna_trials'] = trials
          d['model_training']['cv_folds'] = 3
          # widen the fairness gates so the register stage can finish on PR runs;
          # the production gate stays unchanged on main.
          d['model_evaluation']['max_demographic_parity_diff'] = 0.5
          d['model_evaluation']['max_equal_opportunity_diff'] = 0.5
          p.write_text(yaml.safe_dump(d))
          "

      - name: run pipeline
        run: |
          python -m src.data.ingest
          python -m src.data.validate
          python -m src.features.build
          python -m src.models.train
          python -m src.models.evaluate

      - name: capture metrics
        id: metrics
        run: |
          python -c "
          import json, pathlib
          m = json.loads(pathlib.Path('reports/metrics.json').read_text())
          summary = (
              f\"AUC={m['auc']:.4f}  KS={m['ks']:.4f}  \"
              f\"Lift@10%={m['lift_top_decile']:.2f}  Brier={m['brier']:.4f}\"
          )
          lines = [f\"## Pipeline metrics on this PR\", '', f'`{summary}`', '', '### Fairness']
          for f in m['fairness']:
              lines.append(f\"- **{f['attribute']}**: DPD={f['demographic_parity_diff']:+.3f}  EOD={f['equal_opportunity_diff']:+.3f}\")
          pathlib.Path('pr-comment.md').write_text('\n'.join(lines))
          print('SUMMARY=' + summary)
          " | tee -a "$GITHUB_OUTPUT"

      - name: comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({ owner, repo, issue_number, body });

      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            reports/*.json
            reports/*.csv
            reports/plots/*.png
            models/*.joblib
