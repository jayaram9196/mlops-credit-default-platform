name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint + type-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[serving,monitoring,dev]"

      - name: ruff
        run: ruff check src tests

      - name: black --check
        run: black --check src tests

      - name: mypy
        run: mypy src

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[serving,monitoring,dev]"

      - name: pytest unit
        run: pytest tests/unit -v --cov=src --cov-report=xml --cov-report=term

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  integration-tests:
    name: integration tests (smoke pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[serving,monitoring,dev]"

      - name: smoke pipeline (ingest -> features -> train)
        env:
          OPTUNA_TRIALS: "2"
        run: |
          # Force tiny optuna budget for CI speed
          python -c "
          import yaml, pathlib
          p = pathlib.Path('params.yaml')
          d = yaml.safe_load(p.read_text())
          d['model_training']['optuna_trials'] = 2
          d['model_training']['cv_folds'] = 3
          d['model_evaluation']['max_demographic_parity_diff'] = 0.5
          d['model_evaluation']['max_equal_opportunity_diff'] = 0.5
          p.write_text(yaml.safe_dump(d))
          "
          python -m src.data.ingest
          python -m src.data.validate
          python -m src.features.build
          python -m src.models.train
          python -m src.models.evaluate

      - name: pytest integration
        run: pytest tests/integration -v

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            reports/*.json
            reports/plots/*.png

  security:
    name: security scans
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: bandit (python source)
        run: |
          pip install bandit
          bandit -r src/ -ll -q -f json -o bandit-report.json || true
          bandit -r src/ -ll

      - name: trivy filesystem scan (deps + IaC)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln,misconfig,secret

      - name: upload bandit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
