{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "credit-default-api.fullname" . }}
  labels:
    {{- include "credit-default-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "credit-default-api.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS (S3, MLflow, etc.)
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
