# Example Alertmanager routing. Drop into a Secret consumed by Prometheus
# Operator's Alertmanager CRD, or `alertmanager.yml` for a vanilla deployment.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - matchers: [severity = critical]
      receiver: slack-mlops-critical
      continue: false
    - matchers: [team = mlops]
      receiver: slack-mlops
      continue: false

receivers:
  - name: default
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: "#alerts-default"
        send_resolved: true

  - name: slack-mlops
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: "#mlops-alerts"
        send_resolved: true
        text: |
          *{{ .Status | toUpper }}* — {{ .CommonAnnotations.summary }}
          {{ range .Alerts }}{{ .Annotations.description }}{{ end }}

  - name: slack-mlops-critical
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: "#mlops-incidents"
        send_resolved: true
        text: |
          :rotating_light: *{{ .CommonLabels.alertname }}* — {{ .CommonAnnotations.summary }}
          {{ range .Alerts }}• {{ .Annotations.description }}{{ end }}
