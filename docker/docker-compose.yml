name: loan-default

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: loan-default-api:latest
    container_name: loan-default-api
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models:ro
      - ../params.yaml:/app/params.yaml:ro
    environment:
      MODEL_VERSION: "${MODEL_VERSION:-local-dev}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles: ["", "full"]

  # ---- optional MLflow stack (docker compose --profile full up) ----
  postgres:
    image: postgres:16-alpine
    container_name: loan-default-postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    profiles: ["full"]

  minio:
    image: minio/minio:latest
    container_name: loan-default-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniominio
    volumes:
      - minio-data:/data
    profiles: ["full"]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.12.0
    container_name: loan-default-mlflow
    depends_on: [postgres, minio]
    command: >
      bash -c "pip install --quiet psycopg2-binary boto3 &&
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: miniominio
    ports:
      - "5000:5000"
    profiles: ["full"]

volumes:
  postgres-data:
  minio-data:
